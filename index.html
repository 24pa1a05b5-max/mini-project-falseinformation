<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TruthScan AI | Login</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <div class="glass-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2><i class="fas fa-shield-alt" style="color: #3b82f6;"></i> TruthScan AI</h2>
                <button id="themeToggle" class="theme-toggle"><i class="fas fa-moon"></i> <span>Dark</span></button>
            </div>
            <p class="sub">Advanced misinformation detection · AI-powered analysis</p>
            <form id="loginForm">
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="Enter any username" autocomplete="off" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="Enter any password" required>
                </div>
                <button type="submit" class="btn"><i class="fas fa-arrow-right-to-bracket"></i> Login & Scan</button>
                <p style="font-size: 0.75rem; text-align: center; margin-top: 1rem;">🔐 Simulated login — any credentials work</p>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
