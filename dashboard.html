<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>TruthScan AI | Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="bg-overlay"></div>
    
    <div class="container">
        <div class="glass-card dashboard-card">
            <div class="nav-header">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <i class="fas fa-robot" style="font-size: 28px; color: #3b82f6;"></i>
                    <h2 style="margin-bottom: 0;">AI Verifier</h2>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button id="themeToggle" class="theme-toggle"><i class="fas fa-adjust"></i> Mode</button>
                    <button id="logoutBtn" class="theme-toggle"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
            </div>
            <p class="sub"><i class="fas fa-microchip"></i> Analyze text, URLs, or images — simulated AI confidence score</p>

            <div class="input-group">
                <label><i class="fas fa-quote-left"></i> Statement / Text</label>
                <textarea id="statementInput" placeholder="e.g., 'Vaccines contain microchips...' or paste any news claim..."></textarea>
            </div>

            <div class="flex-row">
                <div style="flex: 2;">
                    <label><i class="fas fa-link"></i> URL Link</label>
                    <input type="text" id="urlInput" placeholder="https://example.com/news" style="width: 100%;">
                </div>
                <div style="flex: 1;">
                    <label><i class="fas fa-image"></i> Image Upload</label>
                    <div class="file-label" id="imageLabel">
                        <i class="fas fa-cloud-upload-alt"></i> Choose file
                    </div>
                    <input type="file" id="imageUpload" accept="image/*">
                    <div id="imageName" style="font-size: 0.7rem; margin-top: 5px;"></div>
                </div>
            </div>

            <button id="analyzeBtn" class="btn" style="margin-top: 1.5rem;"><i class="fas fa-chart-line"></i> Analyze</button>
            <div id="resultArea" class="result-card hidden">
                <div class="score-circle">
                    <span><i class="fas fa-chart-simple"></i> Credibility Score</span>
                    <span class="score-value" id="credibilityScore">0%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div id="colorIndicator" style="font-weight: bold; margin: 8px 0;"></div>
                <div id="reviewMessage" class="review-message"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
